events {
    worker_connections 1024;
}

http {
    upstream mini_agent_backend {
        server mini-agent-1:8000 max_fails=3 fail_timeout=30s;
        server mini-agent-2:8000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;

        # WebSocket connections — long-lived, so read_timeout is extended
        location /ws {
            proxy_pass http://mini_agent_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # Health check — routed to whichever backend is alive
        location /health {
            proxy_pass http://mini_agent_backend;
        }

        # Browser UI served by the app
        location /mini-agent-ui {
            proxy_pass http://mini_agent_backend;
        }

        # When all backends are down, return a JSON error the client can parse
        error_page 502 503 504 @no_backend;
        location @no_backend {
            default_type application/json;
            return 503 '{"type":"error","content":"No healthy service available. Please try again later."}';
        }
    }
}
