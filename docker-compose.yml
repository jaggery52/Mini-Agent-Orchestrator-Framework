# The KB Chroma collections are baked into the image at build time (see deploy/Dockerfile),
# so there is NO chroma volume and NO knowledge_base bind mount here — the image is the
# source of truth. The running containers hold no LLM/search keys; clients supply those in
# the WebSocket `init` handshake. The only server secret is SERVER_ACCESS_TOKEN (auth gate).
#
# Build the images (BuildKit required for the build secret):
#   echo "$OPENAI_API_KEY" > openai_key.txt
#   DOCKER_BUILDKIT=1 docker compose build
# Then (with SERVER_ACCESS_TOKEN set in .env or the shell): docker compose up -d

services:
  mini-agent-1:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      secrets:
        - openai_key
    container_name: mini-agent-1
    environment:
      - SERVER_ACCESS_TOKEN=${SERVER_ACCESS_TOKEN}
      - LOG_FILE=logs/mini-agent-1.log
      - TZ=Europe/Berlin
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  mini-agent-2:
    build:
      context: .
      dockerfile: deploy/Dockerfile
      secrets:
        - openai_key
    container_name: mini-agent-2
    environment:
      - SERVER_ACCESS_TOKEN=${SERVER_ACCESS_TOKEN}
      - LOG_FILE=logs/mini-agent-2.log
      - TZ=Europe/Berlin
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mini-agent-1
      - mini-agent-2
    restart: unless-stopped

# Build-time only: the embedding key used to index the KB. Never copied into the image.
secrets:
  openai_key:
    file: ./openai_key.txt
