version: '3.8'

services:
  mini-agent-1:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: mini-agent-1
    env_file: .env
    environment:
      - LOG_FILE=logs/mini-agent-1.log
      - TZ=Europe/Berlin
    volumes:
      - ./logs:/app/logs
      - ./knowledge_base:/app/knowledge_base
      - chroma_data:/app/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  mini-agent-2:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: mini-agent-2
    env_file: .env
    environment:
      - LOG_FILE=logs/mini-agent-2.log
      - TZ=Europe/Berlin
    volumes:
      - ./logs:/app/logs
      - ./knowledge_base:/app/knowledge_base
      - chroma_data:/app/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mini-agent-1
      - mini-agent-2
    restart: unless-stopped

volumes:
  chroma_data:
