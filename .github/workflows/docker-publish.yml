name: Docker Publish

# Build the runtime image and push it to Docker Hub.
# Fires only on the main branch and on version tags (v1.0.0, v2.1.3, ...).
# It stays dormant on feature branches, so this file is harmless until it
# reaches main. The KB is client-provided at runtime, so the build needs no
# secrets — only the Docker Hub credentials to push.
on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: Mini-Agent-Orchestrator-Framework
      AZURE_CONTAINERAPP_NAME: mini-agent
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/mini-agent-framework
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Auto-deploy the freshly pushed image to Azure Container Apps ---
      # Only on main (not version tags). Deploys by immutable digest so the image
      # reference changes every push, forcing ACA to roll a new revision pinned to
      # exactly this build (a constant :latest tag would dedupe to no new revision).
      - name: Log in to Azure
        if: github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Roll the Container App to the new image
        if: github.ref == 'refs/heads/main'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az extension add --name containerapp --upgrade --only-show-errors
            # Ensure the app has Docker Hub pull credentials for the docker.io host
            # (matches the image reference below, so the private-repo pull authenticates).
            az containerapp registry set \
              --name "$AZURE_CONTAINERAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --server docker.io \
              --username "${{ secrets.DOCKERHUB_USERNAME }}" \
              --password "${{ secrets.DOCKERHUB_TOKEN }}"
            az containerapp update \
              --name "$AZURE_CONTAINERAPP_NAME" \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --image "docker.io/${{ secrets.DOCKERHUB_USERNAME }}/mini-agent-framework@${{ steps.build.outputs.digest }}"
